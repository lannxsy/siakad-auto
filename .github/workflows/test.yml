name: SIAKAD Selenium Test Suite

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-22.04

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: "11732"
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Import Database
        run: mysql -h 127.0.0.1 -u root -proot 11732 < 11732.sql

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install pytest pytest-html selenium webdriver-manager requests

      - name: Install PHP 8.1 dan Apache
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y apache2 php8.1 php8.1-mysql libapache2-mod-php8.1

      - name: Deploy SIAKAD ke Apache
        run: |
          sudo cp -r webakademik /var/www/html/webakademik
          sudo chown -R www-data:www-data /var/www/html/webakademik
          sudo tee /var/www/html/webakademik/koneksi.php > /dev/null << 'PHPEOF'
          <?php
          $konek = mysqli_connect("127.0.0.1", "root", "root", "11732");
          if (!$konek) { die("Koneksi gagal: " . mysqli_connect_error()); }
          ?>
          PHPEOF
          sudo systemctl restart apache2
          sleep 2
          curl -s -o /dev/null -w "HTTP: %{http_code}\n" http://localhost/webakademik/login.php

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run Selenium Tests
        run: |
          mkdir -p reports
          python -m pytest tests/ -v \
            --html=reports/laporan_pengujian.html \
            --self-contained-html \
            --tb=short

      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: laporan-pengujian-siakad
          path: reports/laporan_pengujian.html
          retention-days: 30
