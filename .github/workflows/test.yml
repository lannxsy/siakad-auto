name: SIAKAD Selenium Test Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-22.04   # pakai 22.04 agar php8.1 tersedia

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── 2. Setup Python ───────────────────────────────────────────
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-html selenium webdriver-manager requests

      # ── 3. Setup MySQL ────────────────────────────────────────────
      - name: Start MySQL
        run: |
          sudo systemctl start mysql
          sudo mysql -e "ALTER USER 'root'@'localhost' IDENTIFIED WITH mysql_native_password BY 'root'; FLUSH PRIVILEGES;"
          sudo mysql -u root -proot -e "CREATE DATABASE IF NOT EXISTS \`11732\`;"
          mysql -u root -proot 11732 < 11732.sql

      # ── 4. Setup PHP + Apache ─────────────────────────────────────
      - name: Install PHP 8.1 dan Apache
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y apache2 php8.1 php8.1-mysql php8.1-mysqli libapache2-mod-php8.1

      - name: Deploy SIAKAD ke Apache
        run: |
          sudo cp -r webakademik /var/www/html/webakademik
          sudo chown -R www-data:www-data /var/www/html/webakademik
          sudo bash -c 'cat > /var/www/html/webakademik/koneksi.php << "PHPEOF"
          <?php
          \$konek = mysqli_connect("127.0.0.1", "root", "root", "11732");
          if (!\$konek) { die("Koneksi gagal: " . mysqli_connect_error()); }
          ?>
          PHPEOF'
          sudo systemctl restart apache2
          sleep 2
          curl -s -o /dev/null -w "HTTP Status: %{http_code}\n" http://localhost/webakademik/login.php

      # ── 5. Setup Chrome ───────────────────────────────────────────
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Verify Chrome
        run: google-chrome --version

      # ── 6. Jalankan Test ──────────────────────────────────────────
      - name: Run Selenium Tests
        run: |
          mkdir -p reports
          python -m pytest tests/ -v \
            --html=reports/laporan_pengujian.html \
            --self-contained-html \
            --tb=short

      # ── 7. Upload Laporan ─────────────────────────────────────────
      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: laporan-pengujian-siakad
          path: reports/laporan_pengujian.html
          retention-days: 30